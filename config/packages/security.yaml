security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        api_key_provider:
            memory:
                users:
                    admin:
                        password: '%env(ADMIN_API_KEY)%'
                        roles: ['ROLE_ADMIN']

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        admin_products:
            pattern: ^/api/products$
            methods: [POST]
            stateless: true
            custom_authenticators:
                - App\Shared\Infrastructure\Security\ApiKeyAuthenticator

        admin_products_item:
            pattern: ^/api/products/[^/]+$
            methods: [PATCH, DELETE]
            stateless: true
            custom_authenticators:
                - App\Shared\Infrastructure\Security\ApiKeyAuthenticator

        main:
            lazy: true
            stateless: true

    access_control:
        - { path: ^/api/products$, methods: [POST], roles: ROLE_ADMIN }
        - { path: ^/api/products/.+$, methods: [PATCH, DELETE], roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
