services:
    logger:
        class: Symfony\Component\HttpKernel\Log\Logger
        arguments:
            $minLevel: 'emergency'

    Tests\Stub\Search\InMemoryEmbeddingAdapter: ~

    Tests\Stub\Search\InMemorySemanticSearchAdapter: ~

    App\Search\Domain\Port\EmbeddingPort:
        alias: Tests\Stub\Search\InMemoryEmbeddingAdapter

    App\Search\Domain\Port\SemanticSearchPort:
        alias: Tests\Stub\Search\InMemorySemanticSearchAdapter

    App\Search\Domain\Port\SemanticEnrichmentPort:
        alias: App\Search\Infrastructure\LlmEnrichment\NullSemanticEnrichmentAdapter
