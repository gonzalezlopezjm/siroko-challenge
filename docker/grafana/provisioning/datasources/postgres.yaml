apiVersion: 1

datasources:
  - name: Siroko DB
    uid: siroko-postgres
    type: postgres
    access: proxy
    url: postgres:5432
    database: siroko
    user: siroko
    secureJsonData:
      password: siroko
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
    editable: false
