services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: siroko_php
    volumes:
      - .:/var/www/html:cached
      - ./var:/var/www/html/var
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-siroko_products}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      LANGUAGE_MODEL_PROVIDER: ${LANGUAGE_MODEL_PROVIDER:-openai}
      LANGUAGE_MODEL_API_KEY: ${LANGUAGE_MODEL_API_KEY:-}
      LANGUAGE_MODEL_NAME: ${LANGUAGE_MODEL_NAME:-gpt-4o-mini}
      SEARCH_SIMILARITY_THRESHOLD: ${SEARCH_SIMILARITY_THRESHOLD:-0.35}
      SEARCH_MAX_RESULTS: ${SEARCH_MAX_RESULTS:-10}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - siroko

  nginx:
    image: nginx:1.25-alpine
    container_name: siroko_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - siroko

  postgres:
    image: postgres:16-alpine
    container_name: siroko_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-siroko}
      POSTGRES_USER: ${POSTGRES_USER:-siroko}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siroko}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-siroko}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - siroko

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: siroko_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - siroko

  mailpit:
    image: axllent/mailpit:latest
    container_name: siroko_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - siroko

  grafana:
    image: grafana/grafana-oss:11.0.0
    container_name: siroko_grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - postgres
    networks:
      - siroko

###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      # You should definitely change the password in production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

volumes:
  postgres_data:
  grafana_data:

###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
  qdrant_data:

networks:
  siroko:
    driver: bridge
